<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UltraAI</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}
header{
    background:#222;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}
#chat{
    height:70vh;
    overflow-y:auto;
    padding:15px;
}
.user{
    color:#00ff99;
    margin:10px 0;
}
.ai{
    color:#00bfff;
    margin:10px 0;
}
.bottom{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    background:#222;
}
input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    font-size:18px;
}
button{
    padding:15px;
    border:none;
    background:#00bfff;
    color:white;
    font-size:18px;
}
</style>

</head>

<body>

<header>🤖 UltraAI</header>

<div id="chat"></div>

<div class="bottom">
<input id="userInput" placeholder="कुछ लिखिए...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

async function sendMessage(){

const input=document.getElementById("userInput");
const chat=document.getElementById("chat");

const message=input.value.trim();

if(message=="") return;

chat.innerHTML+=`<div class="user"><b>👤 You:</b> ${message}</div>`;

input.value="";

chat.innerHTML+=`<div class="ai"><b>🤖 UltraAI:</b> Gemini API अभी जोड़ा जाना बाकी है।</div>`;

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
