<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UltraAI</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}
h1{
    color:#00ffcc;
    margin-top:20px;
}
#chat{
    width:90%;
    max-width:700px;
    height:350px;
    margin:20px auto;
    border:1px solid #444;
    border-radius:10px;
    overflow:auto;
    padding:10px;
    background:#222;
    text-align:left;
}
textarea{
    width:90%;
    height:70px;
    border-radius:10px;
    padding:10px;
}
button{
    margin:10px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#00cc99;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<h1>🤖 UltraAI</h1>

<div id="chat"></div>

<textarea id="userInput" placeholder="कुछ लिखें..."></textarea><br>

<button onclick="sendMessage()">Send</button>

<script>
function sendMessage(){
    let input=document.getElementById("userInput").value;
    if(input=="") return;

    let chat=document.getElementById("chat");

    chat.innerHTML += "<p><b>आप:</b> "+input+"</p>";

    chat.innerHTML += "<p><b>UltraAI:</b> AI API जोड़ने के बाद मैं आपके सवालों का जवाब दूँगा।</p>";

    document.getElementById("userInput").value="";
    chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
